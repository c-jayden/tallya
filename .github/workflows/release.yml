name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      releaseName:
        description: "Optional release name. Defaults to Tallya v{package.version}."
        required: false
        type: string
      draft:
        description: "Create the GitHub Release as a draft."
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            rustTarget: x86_64-pc-windows-msvc
            tauriArgs: "--target x86_64-pc-windows-msvc"
            artifactName: tallya-windows-x64-release-assets
          # TODO: Add aarch64-pc-windows-msvc after Windows ARM64 NSIS packaging is verified.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Read and validate versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = cargo.match(/^version\s*=\s*"([^"]+)"/m)?.[1];

          if (!pkg.version) {
            throw new Error('package.json version is missing');
          }

          if (tauri.version !== pkg.version) {
            throw new Error(`Version mismatch: package.json=${pkg.version}, tauri.conf.json=${tauri.version}`);
          }

          if (cargoVersion !== pkg.version) {
            throw new Error(`Version mismatch: package.json=${pkg.version}, Cargo.toml=${cargoVersion}`);
          }

          const tagName = `v${pkg.version}`;

          if (process.env.GITHUB_EVENT_NAME === 'push' && process.env.GITHUB_REF_TYPE === 'tag' && process.env.GITHUB_REF_NAME !== tagName) {
            throw new Error(`Tag ${process.env.GITHUB_REF_NAME} does not match package.json version ${tagName}`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${pkg.version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `TAG_NAME=${tagName}\n`);
          NODE

      - name: Create tag when dispatched manually
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            existing_sha="$(git rev-list -n 1 "${TAG_NAME}")"
            current_sha="$(git rev-parse "${GITHUB_SHA}")"
            if [ "${existing_sha}" != "${current_sha}" ]; then
              echo "::error::Tag ${TAG_NAME} already exists at ${existing_sha}, but this workflow is running ${current_sha}. Select the tagged ref or bump package.json version."
              exit 1
            fi
            echo "Tag ${TAG_NAME} already exists at the current commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "${TAG_NAME}"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test frontend
        run: pnpm test

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: pnpm build

      - name: Ensure Windows installer toolchains
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
            $env:Path += ";C:\Program Files (x86)\NSIS;C:\Program Files\NSIS"
          }
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          makensis /VERSION

          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset -y --no-progress
            $env:Path += ";C:\Program Files (x86)\WiX Toolset v3.14\bin;C:\Program Files (x86)\WiX Toolset v3.11\bin"
          }
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          candle.exe -?

      - name: Build Windows bundles
        uses: tauri-apps/tauri-action@v0
        env:
          # Required because bundle.createUpdaterArtifacts is enabled: signs the
          # updater artifacts so the in-app updater can verify them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.tauriArgs }}

      - name: Collect release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $assetsDir = "dist/release-assets"
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null

          $prefix = "Tallya_${env:APP_VERSION}_windows_${{ matrix.arch }}"
          $nsis = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\bundle\\nsis\\" } |
            Select-Object -First 1
          $msi = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.msi" |
            Where-Object { $_.FullName -match "\\bundle\\msi\\" } |
            Select-Object -First 1
          $releaseExe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "tallya.exe" |
            Where-Object { $_.FullName -match "\\release\\tallya\.exe$" -and $_.FullName -notmatch "\\bundle\\" } |
            Select-Object -First 1

          if (-not $nsis) { throw "NSIS installer was not found." }
          if (-not $msi) { throw "MSI installer was not found." }
          if (-not $releaseExe) { throw "Portable executable was not found." }

          Copy-Item $nsis.FullName "$assetsDir/${prefix}_setup.exe"
          Copy-Item $msi.FullName "$assetsDir/${prefix}.msi"

          $portableDir = "dist/portable/Tallya"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $releaseExe.FullName "$portableDir/Tallya.exe"

          Get-ChildItem -Path $releaseExe.Directory.FullName -Filter "*.dll" -File |
            ForEach-Object { Copy-Item $_.FullName $portableDir }

          Compress-Archive -Path "$portableDir/*" -DestinationPath "$assetsDir/${prefix}_portable.zip" -Force

          # Updater manifest (Windows only for now). The .sig is produced next to
          # the NSIS installer when signing keys are set; renaming the installer
          # doesn't change its bytes, so the signature still matches the asset.
          $sig = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.sig" |
            Where-Object { $_.FullName -match "\\bundle\\nsis\\" } |
            Select-Object -First 1
          if (-not $sig) {
            throw "NSIS updater signature (.sig) was not found. Set the TAURI_SIGNING_PRIVATE_KEY secret."
          }
          $signature = (Get-Content $sig.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/${prefix}_setup.exe"

          # Pull the current version's section from CHANGELOG.md into the updater
          # notes so the in-app "检查更新" shows what changed. Missing section -> "".
          $notes = ""
          if (Test-Path "CHANGELOG.md") {
            $capture = $false
            $collected = @()
            foreach ($line in (Get-Content "CHANGELOG.md")) {
              if ($line -match '^##\s') {
                if ($capture) { break }
                if ($line -match "^##\s+v?$([regex]::Escape($env:APP_VERSION))\b") { $capture = $true }
                continue
              }
              if ($capture) { $collected += $line }
            }
            $notes = ($collected -join "`n").Trim()
          }

          $manifest = [ordered]@{
            version = $env:APP_VERSION
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path "$assetsDir/latest.json" -Encoding UTF8

          Get-ChildItem $assetsDir | ForEach-Object { "- $($_.Name)" } | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NAME_INPUT: ${{ inputs.releaseName }}
          RELEASE_DRAFT: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
        run: |
          $ErrorActionPreference = "Stop"
          $releaseName = $env:RELEASE_NAME_INPUT
          if ([string]::IsNullOrWhiteSpace($releaseName)) {
            $releaseName = "Tallya $env:TAG_NAME"
          }

          # Release notes come from the matching CHANGELOG.md section (same source
          # as the in-app updater notes); fall back to a pointer when absent.
          $changelog = ""
          if (Test-Path "CHANGELOG.md") {
            $capture = $false
            $collected = @()
            foreach ($line in (Get-Content "CHANGELOG.md")) {
              if ($line -match '^##\s') {
                if ($capture) { break }
                if ($line -match "^##\s+v?$([regex]::Escape($env:APP_VERSION))\b") { $capture = $true }
                continue
              }
              if ($capture) { $collected += $line }
            }
            $changelog = ($collected -join "`n").Trim()
          }

          if ([string]::IsNullOrWhiteSpace($changelog)) {
            $changelog = "- 本次更新内容见 CHANGELOG.md。"
          }

          $body = @(
            "## Tallya $env:TAG_NAME",
            "",
            $changelog,
            "",
            "---",
            "- 安装包未配置代码签名：Windows 可能提示未知发布者；macOS 首次打开需在「系统设置 > 隐私与安全性」放行，或右键打开。"
          )
          $bodyPath = "dist/release-body.md"
          ($body -join "`n") | Set-Content -Path $bodyPath -Encoding UTF8

          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
            $args = @("release", "create", $env:TAG_NAME, "--title", $releaseName, "--notes-file", $bodyPath)
            if ($env:RELEASE_DRAFT -eq "true") { $args += "--draft" }
            if ($env:RELEASE_PRERELEASE -eq "true") { $args += "--prerelease" }
            gh @args
          } else {
            gh release edit $env:TAG_NAME --title $releaseName --notes-file $bodyPath
          }

          gh release upload $env:TAG_NAME dist/release-assets/* --clobber

          "Release: https://github.com/${{ github.repository }}/releases/tag/$env:TAG_NAME" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: dist/release-assets/*
          if-no-files-found: error

  macos:
    name: macOS universal
    runs-on: macos-latest
    # The Windows job validates versions and creates the (draft) Release + tag;
    # macOS only builds and uploads its assets onto that same release.
    needs: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Read and validate versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = cargo.match(/^version\s*=\s*"([^"]+)"/m)?.[1];

          if (!pkg.version) {
            throw new Error('package.json version is missing');
          }

          if (tauri.version !== pkg.version) {
            throw new Error(`Version mismatch: package.json=${pkg.version}, tauri.conf.json=${tauri.version}`);
          }

          if (cargoVersion !== pkg.version) {
            throw new Error(`Version mismatch: package.json=${pkg.version}, Cargo.toml=${cargoVersion}`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${pkg.version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `TAG_NAME=v${pkg.version}\n`);
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build macOS universal bundle
        uses: tauri-apps/tauri-action@v0
        env:
          # Required because bundle.createUpdaterArtifacts is enabled; the build
          # produces the .app.tar.gz + .sig that the manifest step below adds to
          # latest.json so macOS gets in-app updates too.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: "--target universal-apple-darwin"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          assetsDir="dist/release-assets"
          mkdir -p "$assetsDir"
          prefix="Tallya_${APP_VERSION}_macos_universal"

          dmg="$(find src-tauri/target -path '*/bundle/dmg/*.dmg' | head -n1)"
          if [ -z "$dmg" ]; then
            echo "::error::macOS DMG was not found."
            exit 1
          fi
          cp "$dmg" "$assetsDir/${prefix}.dmg"

          app="$(find src-tauri/target -path '*/bundle/macos/*.app' -type d | head -n1)"
          if [ -n "$app" ]; then
            ( cd "$(dirname "$app")" && zip -ry "$GITHUB_WORKSPACE/$assetsDir/${prefix}_app.zip" "$(basename "$app")" )
          fi

          # The updater artifact (.app.tar.gz) is what the in-app updater downloads;
          # ship it under a stable name so latest.json can point at it.
          tarball="$(find src-tauri/target -path '*/bundle/macos/*.app.tar.gz' | head -n1)"
          if [ -z "$tarball" ]; then
            echo "::error::macOS updater artifact (.app.tar.gz) was not found. Is createUpdaterArtifacts + the signing key set?"
            exit 1
          fi
          cp "$tarball" "$assetsDir/${prefix}.app.tar.gz"

          ls -1 "$assetsDir" | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG_NAME" dist/release-assets/* --clobber

      - name: Add macOS to updater manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prefix="Tallya_${APP_VERSION}_macos_universal"

          sigfile="$(find src-tauri/target -path '*/bundle/macos/*.app.tar.gz.sig' | head -n1)"
          if [ -z "$sigfile" ]; then
            echo "::error::macOS updater signature (.sig) was not found."
            exit 1
          fi
          signature="$(tr -d '\n' < "$sigfile")"
          url="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${prefix}.app.tar.gz"

          # The Windows job already published latest.json (windows-x86_64 only).
          # Pull it, add the darwin entries (the universal build serves both arches),
          # and re-upload — leaving the Windows pipeline untouched if this fails.
          gh release download "$TAG_NAME" --pattern latest.json --output latest.json --clobber
          tmp="$(mktemp)"
          jq --arg sig "$signature" --arg url "$url" '
            .platforms["darwin-aarch64"] = { signature: $sig, url: $url }
            | .platforms["darwin-x86_64"] = { signature: $sig, url: $url }
          ' latest.json > "$tmp"
          mv "$tmp" latest.json
          gh release upload "$TAG_NAME" latest.json --clobber

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tallya-macos-universal-release-assets
          path: dist/release-assets/*
          if-no-files-found: error
