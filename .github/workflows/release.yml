name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      releaseName:
        description: "Optional release name. Defaults to Tallya v{package.version}."
        required: false
        type: string
      draft:
        description: "Create the GitHub Release as a draft."
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            rustTarget: x86_64-pc-windows-msvc
            tauriArgs: "--target x86_64-pc-windows-msvc"
            artifactName: tallya-windows-x64-nsis
          # TODO: Add aarch64-pc-windows-msvc after Windows ARM64 NSIS packaging is verified.
          # TODO: Add macos-latest and ubuntu-latest jobs after platform-specific packaging is verified.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Read and validate versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = cargo.match(/^version\s*=\s*"([^"]+)"/m)?.[1];

          if (!pkg.version) {
            throw new Error('package.json version is missing');
          }

          if (tauri.version !== pkg.version) {
            throw new Error(`Version mismatch: package.json=${pkg.version}, tauri.conf.json=${tauri.version}`);
          }

          if (cargoVersion !== pkg.version) {
            throw new Error(`Version mismatch: package.json=${pkg.version}, Cargo.toml=${cargoVersion}`);
          }

          const tagName = `v${pkg.version}`;

          if (process.env.GITHUB_EVENT_NAME === 'push' && process.env.GITHUB_REF_TYPE === 'tag' && process.env.GITHUB_REF_NAME !== tagName) {
            throw new Error(`Tag ${process.env.GITHUB_REF_NAME} does not match package.json version ${tagName}`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${pkg.version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `TAG_NAME=${tagName}\n`);
          NODE

      - name: Create tag when dispatched manually
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            existing_sha="$(git rev-list -n 1 "${TAG_NAME}")"
            current_sha="$(git rev-parse "${GITHUB_SHA}")"
            if [ "${existing_sha}" != "${current_sha}" ]; then
              echo "::error::Tag ${TAG_NAME} already exists at ${existing_sha}, but this workflow is running ${current_sha}. Select the tagged ref or bump package.json version."
              exit 1
            fi
            echo "Tag ${TAG_NAME} already exists at the current commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "${TAG_NAME}"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test frontend
        run: pnpm test

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: pnpm build

      - name: Ensure NSIS
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
            $env:Path += ";C:\Program Files (x86)\NSIS;C:\Program Files\NSIS"
          }
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          makensis /VERSION

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: ${{ inputs.releaseName || format('Tallya {0}', env.TAG_NAME) }}
          releaseBody: |
            Tallya ${{ env.TAG_NAME }}

            - 本地 AI 工作记忆工具。
            - Windows 安装包。
            - 当前 AI 生成依赖本机 Codex CLI。
            - 数据默认保存在本机应用数据目录。
            - 覆盖安装不应清空本地数据。
            - 当前安装包未配置代码签名，Windows 可能提示未知发布者。
          releaseDraft: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
          args: ${{ matrix.tauriArgs }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/nsis/*.exe
          if-no-files-found: error
